; ===================== PlatformIO Project Configuration =====================
; Robust upload settings for ESP32 on flaky USB links
; Each line has comments explaining why it's here.

[env]
platform = espressif32                 ; ESP32 core
framework = arduino                            ; (or espidf)

; ---- Flash stability tweaks ----
board_build.flash_mode = dio                   ; safer than qio on many clones
board_build.f_flash    = 40000000L             ; 40 MHz flash clock (reduce SI issues)
; board_upload.flash_size = 4MB                ; uncomment if your module is known 4MB

; ---- Upload over serial via esptool ----
upload_protocol = esptool                      ; serial uploader
upload_speed = 921600                          ; slow & robust (bump later if stable)
upload_resetmethod = default  ; use default (DTR/RTS)
upload_flags =
  --before
  default_reset
  --after
  hard_reset




; ---- Serial monitor settings ----
monitor_speed = 230400                         ; must match Serial.begin()
monitor_dtr = 0                                ; don't wiggle DTR when opening monitor
monitor_rts = 0                                ; don't wiggle RTS (prevents auto-resets)
; Optional: print timestamps in monitor (nice for debugging boot loops)
monitor_filters = time                         ; adds [HH:MM:SS.mmm] to each line

; ---- Library resolver ----
; This repository builds its own library sources directly from `src/`,
; so local development only lists external dependencies here.
; Downstream apps should depend on `esp32_remote_control` itself and let
; `library.json` pull `esp32-common`, `RF24`, and `ArduinoJson` transitively.
lib_ldf_mode = deep+                           ; resolve transitive headers
lib_deps =
  https://github.com/gr82morozr/esp32-common.git
  nrf24/RF24 @ ^1.4.11

; ===================== Per-port environments =====================

;[env:comA]
;board = esp32dev
;upload_port = COM3
;monitor_port = COM3
;build_src_filter = +<*> -<main.cpp> -<mcu_a_main.cpp> -<mcu_b1_main.cpp> ; Build MCU B sensor only

[env:comA_wifi]
board = esp32-s3-devkitc-1
board_build.flash_mode = qio
board_build.f_flash = 80000000L
build_flags =
  -DNRF_SPI_BUS=FSPI
upload_port = COM8
monitor_port = COM8
build_src_filter = +<*> -<main.cpp> -<mcu_a_main.cpp> -<mcu_b_main.cpp> ; Build MCU B WiFi-locked sensor test

[env:comB]
board = esp32dev
upload_port = COM10
monitor_port = COM10
build_src_filter = +<*> -<main.cpp> -<mcu_b_main.cpp> -<mcu_b1_main.cpp> ; Build MCU A serial bridge only
